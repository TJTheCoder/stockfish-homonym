env:
  target_inventory: 250
  horizon: 60
  warmup_steps: 20
  market_cap: 5000
  initial_balance: 1000000.0
  lambda_risk: 0.02
  lambda_urgency: 0.5
  calm_only_episodes: 200

training:
  run_name: amago_cpp_platform
  buffer_dir: artifacts
  epochs: 300
  parallel_actors: 4
  env_mode: sync
  timesteps_per_epoch: 60
  batches_per_epoch: 256
  batch_size: 16
  dset_max_size: 5000
  dloader_workers: 2
  max_seq_len: 64
  traj_save_len: 96
  val_interval: 10
  ckpt_interval: 25
  mixed_precision: "no"

model:
  traj_encoder: rnn
  memory_size: 128
  memory_layers: 2
  tstep:
    n_layers: 2
    d_hidden: 256
    d_output: 128
  exploration:
    eps_start: 1.0
    eps_end: 0.05
    steps_anneal: 100000
  agent:
    tau: 0.004
    reward_multiplier: 1.0

eval:
  val_timesteps: 240
  episodes: 30
  seed_offset: 10000
